<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ECU IDS SOC Dashboard</title>

    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0a0f1a;
            color: #ffffff;
        }

        header {
            background: #0f172a;
            padding: 15px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: #00ffd5;
            border-bottom: 1px solid #1e293b;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 20px;
        }

        .card {
            background: #111827;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0,255,213,0.08);
        }

        .card h2 {
            margin: 0;
            font-size: 28px;
            color: #00ffd5;
        }

        .card p {
            margin-top: 8px;
            color: #9ca3af;
        }

        .logs {
            grid-column: span 2;
            background: #0f172a;
            padding: 15px;
            border-radius: 12px;
            height: 400px;
            overflow-y: auto;
        }

        .log {
            background: #111827;
            margin: 8px 0;
            padding: 10px;
            border-left: 4px solid red;
            border-radius: 6px;
            font-size: 13px;
        }

        .chart-box {
            grid-column: span 1;
            background: #0f172a;
            padding: 15px;
            border-radius: 12px;
        }

        canvas {
            width: 100% !important;
            height: 250px !important;
        }
    </style>
</head>

<body>

<header>
    🚗 Automotive ECU Intrusion Detection SOC Dashboard
</header>

<div class="grid">

    <!-- STATS -->
    <div class="card">
        <h2 id="attacks">0</h2>
        <p>Total Attacks</p>
    </div>

    <div class="card">
        <h2 id="blocked">0</h2>
        <p>Blocked ECUs</p>
    </div>

    <div class="card">
        <h2 id="threat">0</h2>
        <p>Threat Score</p>
    </div>

    <!-- LOGS -->
    <div class="logs" id="logBox">
        <h3>Live Attack Feed</h3>
    </div>

    <!-- CHART -->
    <div class="chart-box">
        <h3 style="text-align:center;">Attack Trend</h3>
        <canvas id="chart"></canvas>
    </div>

</div>

<script>
    const socket = io();

    let attacks = 0;
    let blocked = 0;
    let threat = 0;

    const ctx = document.getElementById('chart').getContext('2d');

    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                label: 'Attacks Over Time',
                data: [],
                borderColor: '#00ffd5',
                tension: 0.3
            }]
        }
    });

    socket.on("alert", function(data) {

        // LOG UI
        let logBox = document.getElementById("logBox");

        let div = document.createElement("div");
        div.className = "log";

        div.innerHTML = `
            <b>${data.type}</b><br>
            CAN ID: ${data.can_id}<br>
            Severity: ${data.severity}<br>
            Time: ${data.timestamp}
        `;

        logBox.prepend(div);

        // STATS
        attacks++;
        document.getElementById("attacks").innerText = attacks;

        if (data.type.toLowerCase().includes("block")) {
            blocked++;
            document.getElementById("blocked").innerText = blocked;
        }

        threat = Math.min(100, threat + 3);
        document.getElementById("threat").innerText = threat;

        // CHART UPDATE
        chart.data.labels.push(attacks);
        chart.data.datasets[0].data.push(attacks);

        if (chart.data.labels.length > 15) {
            chart.data.labels.shift();
            chart.data.datasets[0].data.shift();
        }

        chart.update();
    });
</script>

</body>
</html>
